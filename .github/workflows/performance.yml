name: performance

on:
  workflow_dispatch:
  push:
    paths:
      - '*.go'
      - 'cmd_*.go'
      - 'pkg/**'
      - 'tools/**'
      - 'scripts/alignment/**'
      - 'test-data/**'
      - 'data/**'
      - '.github/workflows/performance.yml'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install rs-reborn
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/rainoffallingstar/rs-reborn/main/install.sh | bash
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rvx version

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system libs for R native packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libpng-dev libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev pkg-config

      - name: Prepare embedded SQLite DB for benchmark binary
        shell: bash
        env:
          EMBED_SPECIES: hsa
          EMBED_IDMAPS_LEVEL: basic
        run: |
          set -euo pipefail
          CGO_ENABLED=0 go build -o /tmp/enrichgo-bootstrap .
          manifest_profile="embedded-${EMBED_SPECIES}-${EMBED_IDMAPS_LEVEL}"

          go run ./tools/build_embedded_db \
            --db assets/default_enrichgo.db \
            --manifest assets/default_enrichgo.db.manifest.json \
            --artifact assets/default_enrichgo.db \
            --data-dir data \
            --species "${EMBED_SPECIES}" \
            --contract-profile "${manifest_profile}" \
            --idmaps-level "${EMBED_IDMAPS_LEVEL}" \
            --go-ontology BP

          audit_output="$(/tmp/enrichgo-bootstrap db audit --db "assets/default_enrichgo.db" --expect-embedded-manifest --strict-contract=true)"
          echo "$audit_output"

          extract_value() {
            local key="$1"
            echo "$audit_output" | awk -F= -v k="$key" '$1==k {print $2}' | tail -n1
          }

          [[ "$(extract_value status)" == "ok" ]]
          [[ "$(extract_value contract_profile)" == "${manifest_profile}" ]]
          [[ "$(extract_value rows.dataset)" -gt 0 ]]
          [[ "$(extract_value rows.term)" -gt 0 ]]
          [[ "$(extract_value rows.gene_dict)" -gt 0 ]]
          [[ "$(extract_value rows.term_gene)" -gt 0 ]]
          [[ "$(extract_value rows.idmap_canon)" -gt 0 ]]

      - name: Build
        run: go build -o enrichgo .

      - name: Verify embedded DB manifest contract (built binary)
        shell: bash
        run: |
          ./enrichgo db audit --db "assets/default_enrichgo.db" --expect-embedded-manifest --strict-contract=true

      - name: Static build check (CGO_ENABLED=0)
        shell: bash
        run: |
          set -euo pipefail
          CGO_ENABLED=0 go build -o /tmp/enrichgo-static .

      - name: Prepare KEGG-mappable input
        shell: bash
        run: |
          python3 scripts/alignment/filter_input_by_idmap.py \
            test-data/DE_results.csv \
            data/kegg_hsa_idmap.tsv \
            /tmp/benchmark_input_kegg.csv

      - name: ORA benchmark (Go vs R)
        shell: bash
        run: |
          ./enrichgo analyze ora \
            -i /tmp/benchmark_input_kegg.csv \
            -d kegg -s hsa \
            --fdr-col FDR --fdr-threshold 0.05 --split-by-direction=false \
            --use-embedded-db=true \
            -o /tmp/benchmark_ora_kegg_go.tsv \
            --benchmark \
            --benchmark-out /tmp/benchmark_ora_report.tsv

      - name: GSEA benchmark (Go vs R)
        shell: bash
        run: |
          ./enrichgo analyze gsea \
            -i /tmp/benchmark_input_kegg.csv \
            -d kegg -s hsa \
            -rank-col logFC -nPerm 50 \
            --use-embedded-db=true \
            -o /tmp/benchmark_gsea_kegg_go.tsv \
            --benchmark \
            --benchmark-out /tmp/benchmark_gsea_report.tsv

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports
          path: |
            /tmp/benchmark_ora_report.tsv
            /tmp/benchmark_gsea_report.tsv
            /tmp/benchmark_ora_kegg_go.tsv
            /tmp/benchmark_ora_kegg_go.r.tsv
            /tmp/benchmark_gsea_kegg_go.tsv
            /tmp/benchmark_gsea_kegg_go.r.tsv
