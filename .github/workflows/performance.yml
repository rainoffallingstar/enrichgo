name: performance

on:
  workflow_dispatch:
  push:
    paths:
      - '*.go'
      - 'cmd_*.go'
      - 'pkg/**'
      - 'scripts/alignment/**'
      - 'test-data/**'
      - 'data/**'
      - '.github/workflows/performance.yml'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install R deps (pak + GitHub)
        shell: bash
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e 'if (!requireNamespace("pak", quietly=TRUE)) install.packages("pak", repos="https://r-lib.github.io/p/pak/stable/")'
          Rscript -e 'pak::pak(c("BiocParallel","org.Hs.eg.db","jsonlite","YuLab-SMU/yulab.utils","YuLab-SMU/DOSE","YuLab-SMU/GOSemSim","YuLab-SMU/enrichplot","YuLab-SMU/clusterProfiler"))'

      - name: Verify R deps
        shell: bash
        run: |
          Rscript -e 'pkgs <- c("clusterProfiler","org.Hs.eg.db","BiocParallel","jsonlite"); missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly=TRUE)]; if (length(missing) > 0) stop(paste("missing R packages:", paste(missing, collapse=",")))'

      - name: Prepare embedded SQLite DB for benchmark binary
        shell: bash
        env:
          EMBED_SPECIES: hsa
          EMBED_IDMAPS_LEVEL: basic
        run: |
          set -euo pipefail
          mkdir -p assets

          CGO_ENABLED=0 go build -o /tmp/enrichgo-bootstrap .
          /tmp/enrichgo-bootstrap download \
            -d kegg -s "${EMBED_SPECIES}" \
            --db "assets/default_enrichgo.db" --db-only \
            --idmaps --idmaps-level "${EMBED_IDMAPS_LEVEL}"

          audit_output="$(/tmp/enrichgo-bootstrap db-audit --db "assets/default_enrichgo.db")"
          echo "$audit_output"

          extract_value() {
            local key="$1"
            echo "$audit_output" | awk -F= -v k="$key" '$1==k {print $2}' | tail -n1
          }

          [[ "$(extract_value status)" == "ok" ]]
          [[ "$(extract_value rows.geneset)" -gt 0 ]]
          [[ "$(extract_value rows.geneset_gene)" -gt 0 ]]
          [[ "$(extract_value rows.idmap)" -gt 0 ]]

      - name: Build
        run: go build -o enrichgo .

      - name: Static build check (CGO_ENABLED=0)
        shell: bash
        run: |
          set -euo pipefail
          CGO_ENABLED=0 go build -o /tmp/enrichgo-static .

      - name: Prepare KEGG-mappable input
        shell: bash
        run: |
          python3 scripts/alignment/filter_input_by_idmap.py \
            test-data/DE_results.csv \
            data/kegg_hsa_idmap.tsv \
            /tmp/benchmark_input_kegg.csv

      - name: ORA benchmark (Go vs R)
        shell: bash
        run: |
          ./enrichgo enrich \
            -i /tmp/benchmark_input_kegg.csv \
            -d kegg -s hsa \
            --fdr-col FDR --fdr-threshold 0.05 --split-by-direction=false \
            --use-embedded-db=true \
            -o /tmp/benchmark_ora_kegg_go.tsv \
            --benchmark \
            --benchmark-out /tmp/benchmark_ora_report.tsv

      - name: GSEA benchmark (Go vs R)
        shell: bash
        run: |
          ./enrichgo gsea \
            -i /tmp/benchmark_input_kegg.csv \
            -d kegg -s hsa \
            -rank-col logFC -nPerm 50 \
            --use-embedded-db=true \
            -o /tmp/benchmark_gsea_kegg_go.tsv \
            --benchmark \
            --benchmark-out /tmp/benchmark_gsea_report.tsv

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports
          path: |
            /tmp/benchmark_ora_report.tsv
            /tmp/benchmark_gsea_report.tsv
            /tmp/benchmark_ora_kegg_go.tsv
            /tmp/benchmark_ora_kegg_go.r.tsv
            /tmp/benchmark_gsea_kegg_go.tsv
            /tmp/benchmark_gsea_kegg_go.r.tsv
