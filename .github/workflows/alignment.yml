name: alignment

on:
  workflow_dispatch:
  push:
    paths:
      - '*.go'
      - 'cmd_*.go'
      - 'pkg/**'
      - 'scripts/alignment/**'
      - 'docs/alignment.md'
      - 'test-data/**'
      - 'data/**'
      - '.github/workflows/alignment.yml'

jobs:
  alignment:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install R deps (pak + GitHub)
        shell: bash
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e 'if (!requireNamespace("pak", quietly=TRUE)) install.packages("pak", repos="https://r-lib.github.io/p/pak/stable/")'
          Rscript -e 'pak::pak(c("BiocParallel","org.Hs.eg.db","jsonlite","YuLab-SMU/clusterProfiler"))'

      - name: Verify R deps
        shell: bash
        run: |
          Rscript -e 'pkgs <- c("clusterProfiler","org.Hs.eg.db","BiocParallel","jsonlite"); missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly=TRUE)]; if (length(missing) > 0) stop(paste("missing R packages:", paste(missing, collapse=",")))'

      - name: Unit tests
        run: go test ./...

      - name: Alignment smoke+formal gates
        shell: bash
        env:
          ALIGN_SKIP_DOWNLOAD: "1"
          SMOKE_NPERM: "100"
          FORMAL_NPERM: "5000"
        run: |
          bash ./scripts/alignment/run_alignment_ci.sh /tmp/alignment_ci data test-data/DE_results.csv

      - name: Upload alignment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alignment-ci
          path: /tmp/alignment_ci
