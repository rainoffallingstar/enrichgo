name: alignment

on:
  workflow_dispatch:
  push:
    paths:
      - '*.go'
      - 'cmd_*.go'
      - 'pkg/**'
      - 'scripts/alignment/**'
      - 'docs/alignment.md'
      - 'test-data/**'
      - 'data/**'
      - '.github/workflows/alignment.yml'

jobs:
  alignment:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install rs-reborn
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/rainoffallingstar/rs-reborn/main/install.sh | bash
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rvx version

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system libs for R native packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libpng-dev libcurl4-openssl-dev pkg-config

      - name: Unit tests
        run: go test ./...

      - name: Static build check (CGO_ENABLED=0)
        shell: bash
        run: |
          set -euo pipefail
          CGO_ENABLED=0 go build -o /tmp/enrichgo-static .

      - name: Alignment smoke+formal gates
        shell: bash
        env:
          ALIGN_SKIP_DOWNLOAD: "1"
          SMOKE_NPERM: "1000"
          FORMAL_NPERM: "1000"
        run: |
          bash ./scripts/alignment/run_alignment_ci.sh /tmp/alignment_ci data test-data/DE_results.csv

      - name: Upload alignment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alignment-ci
          path: /tmp/alignment_ci
