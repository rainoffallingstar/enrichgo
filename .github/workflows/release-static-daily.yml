name: release-static-daily

on:
  workflow_dispatch:
    inputs:
      idmaps_level:
        description: "Optional extra packaged .db level for workflow_dispatch: set to extended to attempt a non-blocking extended artifact; required basic artifact is always built"
        required: false
        default: "basic"
      species:
        description: "Species code for packaged .db artifact (e.g., hsa, mmu)"
        required: false
        default: "hsa"
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: daily-release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: "Guard: release only from main"
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Refusing to publish release from non-main ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Compute tag (UTC date)
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="$(date -u +%Y-%m-%d)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create/update tag on current commit
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --force --tags origin
          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/$TAG"

      - name: Build embedded SQLite DB for binaries (fixed profile)
        shell: bash
        env:
          EMBED_SPECIES: hsa
          EMBED_IDMAPS_LEVEL: basic
        run: |
          set -euo pipefail

          echo "Preparing embedded SQLite DB for species=${EMBED_SPECIES} idmaps_level=${EMBED_IDMAPS_LEVEL}"
          mkdir -p assets dist

          # Build a bootstrap binary using repository seed DB, then refresh embed DB before final build.
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o /tmp/enrichgo-bootstrap .

          /tmp/enrichgo-bootstrap data sync \
            -d all -s "${EMBED_SPECIES}" -ont ALL -c all \
            --db "assets/default_enrichgo.db" --db-only \
            --idmaps --idmaps-level "${EMBED_IDMAPS_LEVEL}"

          audit_output="$(/tmp/enrichgo-bootstrap db audit --db "assets/default_enrichgo.db")"
          echo "$audit_output"

          extract_value() {
            local key="$1"
            echo "$audit_output" | awk -F= -v k="$key" '$1==k {print $2}' | tail -n1
          }

          status="$(extract_value status)"
          geneset_rows="$(extract_value rows.geneset)"
          geneset_gene_rows="$(extract_value rows.geneset_gene)"
          idmap_rows="$(extract_value rows.idmap)"

          [[ "$status" == "ok" ]]
          [[ "${geneset_rows:-0}" -gt 0 ]]
          [[ "${geneset_gene_rows:-0}" -gt 0 ]]
          [[ "${idmap_rows:-0}" -gt 0 ]]

      - name: Build static binaries (CGO_ENABLED=0; embed prepared DB)
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          ldflags="-s -w"

          build_one() {
            local goos="$1"
            local goarch="$2"
            local ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi
            local base="enrichgo_${TAG}_${goos}_${goarch}"
            local bin="dist/${base}${ext}"

            echo "Building $bin"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "$ldflags" -o "$bin" .

            if [[ "$goos" == "windows" ]]; then
              (cd dist && zip -q "${base}.zip" "${base}${ext}")
              rm -f "$bin"
            else
              (cd dist && tar -czf "${base}.tar.gz" "${base}${ext}")
              rm -f "$bin"
            fi
          }

          build_one linux amd64
          build_one linux arm64
          build_one darwin amd64
          build_one darwin arm64
          build_one windows amd64

      - name: Build required packaged SQLite DB artifact (basic)
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          SPECIES: ${{ github.event.inputs.species || 'hsa' }}
          IDMAPS_LEVEL: basic
          EMBED_SPECIES: hsa
          EMBED_IDMAPS_LEVEL: basic
        run: |
          set -euo pipefail

          db_base="enrichgo_db_${TAG}_${SPECIES}_${IDMAPS_LEVEL}.db"
          db_path="dist/${db_base}"

          if [[ "${SPECIES}" == "${EMBED_SPECIES}" && "${IDMAPS_LEVEL}" == "${EMBED_IDMAPS_LEVEL}" ]]; then
            cp assets/default_enrichgo.db "${db_path}"
          else
            /tmp/enrichgo-bootstrap data sync \
              -d all -s "${SPECIES}" -ont ALL -c all \
              --db "${db_path}" --db-only \
              --idmaps --idmaps-level "${IDMAPS_LEVEL}"
            /tmp/enrichgo-bootstrap db audit --db "${db_path}"
          fi

          gzip -9 "${db_path}"

      - name: Build optional packaged SQLite DB artifact (extended, non-blocking)
        id: build_optional_extended
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.idmaps_level == 'extended' }}
        continue-on-error: true
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          SPECIES: ${{ github.event.inputs.species || 'hsa' }}
          IDMAPS_LEVEL: extended
        run: |
          set -euo pipefail

          db_base="enrichgo_db_${TAG}_${SPECIES}_${IDMAPS_LEVEL}.db"
          db_path="dist/${db_base}"

          /tmp/enrichgo-bootstrap data sync \
            -d all -s "${SPECIES}" -ont ALL -c all \
            --db "${db_path}" --db-only \
            --idmaps --idmaps-level "${IDMAPS_LEVEL}"
          /tmp/enrichgo-bootstrap db audit --db "${db_path}"

          gzip -9 "${db_path}"

      - name: Log optional extended artifact failure
        if: ${{ steps.build_optional_extended.outcome == 'failure' }}
        shell: bash
        run: |
          echo "[WARN] optional extended DB artifact failed; continuing release with required basic artifact only."

      - name: Checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum *.tar.gz *.zip *.db.gz > SHA256SUMS)

      - name: Create/update GitHub Release (same tag per day)
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          name: enrichgo ${{ steps.tag.outputs.tag }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: dist/*.tar.gz,dist/*.zip,dist/*.db.gz,dist/SHA256SUMS
          body: |
            Daily static builds (CGO_ENABLED=0).
            Binaries embed a CI-built default SQLite DB with fixed profile: species=hsa, idmaps_level=basic.
            Packaged offline DB always includes required `basic` artifact: `enrichgo_db_<tag>_<species>_basic.db.gz`.
            Manual runs can optionally request an additional `extended` artifact (`idmaps_level=extended`); this step is non-blocking.
            Commit: ${{ github.sha }}
